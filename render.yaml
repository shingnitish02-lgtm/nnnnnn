services:
  - type: web
    name: xoptime
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn wsgi:app --workers 2 --bind 0.0.0.0:$PORT
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: xoptime-db
          property: connectionString
      - key: FLASK_DEBUG
        value: false
      - key: PLATFORM_COMMISSION
        value: "10"

databases:
  - name: xoptime-db
    databaseName: xoptime
    user: xoptime
    plan: free
