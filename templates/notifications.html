{% extends "base.html" %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
  <h1 class="h4 fw-bold m-0">Notifications</h1>
  <form method="post" action="/notifications/read_all">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    <button class="btn btn-sm btn-outline" type="submit">Mark all read</button>
  </form>
</div>

{% if not rows or rows|length==0 %}
  <div class="card p-4 text-center small-muted">No notifications yet.</div>
{% else %}
  <div class="vstack gap-2">
    {% for n in rows %}
      <div class="card p-3 {% if not n.is_read %}border border-warning{% endif %}">
        <div class="d-flex justify-content-between align-items-start gap-2">
          <div>
            <div class="fw-semibold">{{ n.title }}</div>
            {% if n.body %}<div class="small-muted">{{ n.body }}</div>{% endif %}
            <div class="small text-muted mt-1">{{ n.created_at }}</div>
          </div>
          {% if not n.is_read %}
          <form method="post" action="/notifications/read/{{ n.id }}">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <button class="btn btn-sm btn-outline" type="submit">Read</button>
          </form>
          {% endif %}
        </div>
      </div>
    {% endfor %}
  </div>
{% endif %}
{% endblock %}
