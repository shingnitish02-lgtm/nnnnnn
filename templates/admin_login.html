{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center mt-5">
  <div class="col-md-4">
    <div class="text-center mb-4">
      <h2>🔐 Admin Login</h2>
      <p class="text-muted">Sirf admin access</p>
    </div>
    <div class="card p-4 shadow">
      {% with msgs = get_flashed_messages(with_categories=true) %}
        {% for cat, msg in msgs %}
          <div class="alert alert-{{ 'danger' if cat == 'err' else 'success' }} py-2">{{ msg }}</div>
        {% endfor %}
      {% endwith %}
      <form method="post">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <div class="mb-3">
          <label class="form-label">Email</label>
          <input class="form-control" type="email" name="email" required
                 placeholder="admin@xoptime.com" autofocus>
        </div>
        <div class="mb-4">
          <label class="form-label">Password</label>
          <input class="form-control" type="password" name="password"
                 required placeholder="••••••••">
        </div>
        <button class="btn btn-danger w-100 py-2" type="submit">Login →</button>
      </form>
    </div>
    <div class="text-center mt-3 text-muted small">
      Default: admin@xoptime.com / admin123
    </div>
  </div>
</div>
{% endblock %}
