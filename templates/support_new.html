{% extends "base.html" %}
{% block content %}
<h1 class="h4 fw-bold mb-3">New Support Ticket</h1>
<div class="card p-4">
  <form method="post">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    <div class="mb-3">
      <label class="form-label">Subject</label>
      <input class="form-control input" name="subject" required>
    </div>
    <div class="mb-3">
      <label class="form-label">Message</label>
      <textarea class="form-control input" rows="5" name="body" required></textarea>
    </div>
    <button class="btn btn-primary">Create ticket</button>
    <a class="btn btn-outline ms-2" href="/support">Back</a>
  </form>
</div>
{% endblock %}
