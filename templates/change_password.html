{% extends "base.html" %}
{% block title %}Change Password – Xoptime{% endblock %}
{% block content %}
<div style="max-width:480px;margin:40px auto;padding:0 16px">
  <div style="background:#111827;border:1px solid #1f2937;border-radius:16px;padding:32px">
    <h2 style="font-size:20px;font-weight:700;color:#eaf0ff;margin-bottom:20px">Change Password</h2>
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for cat,msg in messages %}
        <div style="padding:10px 14px;border-radius:8px;margin-bottom:12px;font-size:13px;
          {% if cat=='err' %}background:rgba(239,68,68,.1);color:#f87171{% else %}background:rgba(16,185,129,.1);color:#6ee7b7{% endif %}">{{ msg }}</div>
      {% endfor %}
    {% endwith %}
    <form method="POST">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
      <div style="margin-bottom:14px">
        <label style="display:block;font-size:12px;color:#9ca3af;margin-bottom:6px">Current Password</label>
        <input type="password" name="old_password" required
          style="width:100%;background:#1f2937;border:1px solid #374151;color:#eaf0ff;padding:10px 14px;border-radius:8px;font-size:14px;outline:none;box-sizing:border-box">
      </div>
      <div style="margin-bottom:20px">
        <label style="display:block;font-size:12px;color:#9ca3af;margin-bottom:6px">New Password (min 6 chars)</label>
        <input type="password" name="new_password" required minlength="6"
          style="width:100%;background:#1f2937;border:1px solid #374151;color:#eaf0ff;padding:10px 14px;border-radius:8px;font-size:14px;outline:none;box-sizing:border-box">
      </div>
      <button type="submit"
        style="width:100%;padding:12px;background:linear-gradient(90deg,#ff4f9a,#7c4dff);color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer">
        Update Password
      </button>
    </form>
  </div>
</div>
{% endblock %}
